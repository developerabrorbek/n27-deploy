services:
  backend:
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - .env
    ports: 
      - "4000:4000"
    depends_on:
      - db
  
  db:
    image: postgres:latest
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=abrorbek
      - POSTGRES_DB=typeorm
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
